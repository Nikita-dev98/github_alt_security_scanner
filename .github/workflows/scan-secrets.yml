name: Secrets Scan (Gitleaks)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Gitleaks binary
        id: cache-gitleaks
        uses: actions/cache@v4
        with:
          path: ./gitleaks
          key: gitleaks-8.18.4-${{ runner.os }}

      - name: Download Gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          VERSION="8.18.4"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          chmod +x gitleaks

      - name: Run Gitleaks
        run: |
          ./gitleaks detect \
            --source=. \
            --report-format=json \
            --report-path=gitleaks-report.json \
            --redact \
            --exit-code=0

      - name: Write step summary
        if: always()
        run: |
          COUNT=$(jq 'if type=="array" then length else 0 end' gitleaks-report.json 2>/dev/null || echo 0)
          echo "### Secrets Scan (Gitleaks)" >> $GITHUB_STEP_SUMMARY
          if [ "$COUNT" -gt 0 ]; then
            echo ":warning: **$COUNT potential secret(s) found**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Rule | File | Line |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
            jq -r '.[] | "| \(.RuleID) | `\(.File)` | \(.StartLine) |"' gitleaks-report.json >> $GITHUB_STEP_SUMMARY
          else
            echo ":white_check_mark: No secrets found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore
