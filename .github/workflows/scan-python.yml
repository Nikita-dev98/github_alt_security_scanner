name: Python Scan (Bandit)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Python files
        id: check
        run: |
          if find . -name "*.py" \
               -not -path "./.git/*" \
               -not -path "./node_modules/*" \
               -not -path "./vendor/*" \
               | grep -q .; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache pip packages
        if: steps.check.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: bandit-${{ runner.os }}-v1

      - name: Install Bandit
        if: steps.check.outputs.skip == 'false'
        run: pip install bandit -q

      - name: Run Bandit
        if: steps.check.outputs.skip == 'false'
        run: |
          bandit \
            --recursive . \
            --format json \
            --output bandit-report.json \
            --severity-level medium \
            --confidence-level medium \
            --exclude ./.git,./node_modules,./vendor \
            || true

      - name: Write step summary
        if: always()
        run: |
          echo "### Python Scan (Bandit)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.skip }}" == "true" ]; then
            echo ":white_check_mark: No Python files found — skipped" >> $GITHUB_STEP_SUMMARY
          elif [ -f "bandit-report.json" ]; then
            COUNT=$(jq '.results | length' bandit-report.json 2>/dev/null || echo 0)
            if [ "$COUNT" -gt 0 ]; then
              echo ":warning: **$COUNT issue(s) found**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Test ID | Severity | File | Line | Issue |" >> $GITHUB_STEP_SUMMARY
              echo "|---------|----------|------|------|-------|" >> $GITHUB_STEP_SUMMARY
              jq -r '.results[] | "| \(.test_id) | \(.issue_severity) | `\(.filename | split("/") | last)` | \(.line_number) | \(.issue_text) |"' \
                bandit-report.json >> $GITHUB_STEP_SUMMARY
            else
              echo ":white_check_mark: No issues found" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo ":white_check_mark: No output produced" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload report
        if: always() && steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore
